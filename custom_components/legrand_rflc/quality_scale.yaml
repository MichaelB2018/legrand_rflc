rules:
  # Bronze
  action-setup:
    status: exempt
    comment: Integration has no custom actions/services.
  appropriate-polling:
    status: done
    comment: local_push IoT class; no polling.
  brands:
    status: done
    comment: Brand images shipped in brand/ directory.
  common-modules:
    status: done
  config-flow:
    status: done
  config-flow-test-coverage:
    status: done
  dependency-transparency:
    status: done
    comment: Hub library vendored as hub.py (MIT license, from lc7001 v1.0.5).
  docs-actions:
    status: exempt
    comment: Integration has no custom actions/services.
  docs-high-level-description:
    status: done
  docs-installation-instructions:
    status: done
  docs-removal-instructions:
    status: done
  entity-event-setup:
    status: done
    comment: Subscriptions in async_added_to_hass, cleanup in async_will_remove_from_hass.
  entity-unique-id:
    status: done
    comment: Format is host:zid.
  has-entity-name:
    status: done
  runtime-data:
    status: done
    comment: Uses ConfigEntry.runtime_data with LegrandRFLCData dataclass.
  test-before-configure:
    status: done
    comment: Config flow tests connection before creating entry.
  test-before-setup:
    status: done
    comment: async_setup_entry tests connection; raises ConfigEntryNotReady on failure.
  unique-config-entry:
    status: done
    comment: Unique ID is the hub host; duplicates are aborted.

  # Silver
  action-exceptions:
    status: done
    comment: StatusError wrapped as HomeAssistantError.
  config-entry-unloading:
    status: done
    comment: Hub cancelled, platforms unloaded.
  docs-configuration-parameters:
    status: done
  docs-installation-parameters:
    status: done
    comment: README documents host and password fields.
  docs-troubleshooting:
    status: done
  entity-unavailable:
    status: done
    comment: Tracks hub connected and authenticated state.
  integration-owner:
    status: done
  log-when-unavailable:
    status: done
    comment: Logs transitions at warning (unavailable) and info (available).
  parallel-updates:
    status: done
    comment: PARALLEL_UPDATES = 1 in light.py.
  reauthentication-flow:
    status: done
  test-coverage:
    status: done

  # Gold
  devices:
    status: done
    comment: Hub device and per-zone child devices.
  diagnostics:
    status: done
    comment: Reports hub status, connection info, and zone properties with auth redaction.
  discovery:
    status: done
    comment: DHCP discovery supported.
  discovery-update-info:
    status: exempt
    comment: Hub uses mDNS hostname; IP changes handled by DNS resolution.
  docs-data-update:
    status: done
  docs-examples:
    status: done
  docs-known-limitations:
    status: done
  docs-supported-devices:
    status: done
  docs-supported-functions:
    status: done
  docs-use-cases:
    status: done
  dynamic-devices:
    status: done
    comment: Config entry reloads on zone add/delete.
  entity-category:
    status: done
    comment: Light entities are primary controls (no category). Sensor entities use EntityCategory.DIAGNOSTIC.
  entity-device-class:
    status: exempt
    comment: Light entities do not use device_class.
  entity-disabled-by-default:
    status: done
    comment: Diagnostic sensors are enabled by default as they are low-volume. Light entities are primary controls.
  entity-translations:
    status: done
  exception-translations:
    status: done
    comment: HomeAssistantError uses translation_domain and translation_key.
  icon-translations:
    status: done
    comment: Icons defined in icons.json via translation_key.
  reconfiguration-flow:
    status: done
  repair-issues:
    status: exempt
    comment: No repair-worthy issues to raise programmatically.
  stale-devices:
    status: done
    comment: Config entry reload on zone deletion removes stale devices.

  # Platinum
  async-dependency:
    status: done
    comment: Vendored hub.py uses asyncio natively.
  inject-websession:
    status: exempt
    comment: Library uses raw TCP sockets, not HTTP.
  strict-typing:
    status: done
    comment: Full type annotations with py.typed marker.
